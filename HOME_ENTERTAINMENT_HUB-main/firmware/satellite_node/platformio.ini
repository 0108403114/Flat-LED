[env:esp32-s3-zero]
platform  = espressif32
board     = dfrobot_firebeetle2_esp32s3
framework = arduino

; Waveshare ESP32-S3-Zero は dfrobot_firebeetle2_esp32s3 定義で安定
; ボード定義のデフォルト(qio / 4MB / ARDUINO_USB_MODE=1)をそのまま使用
upload_port = COM3
monitor_port = COM3
upload_speed = 115200
monitor_speed = 115200

lib_deps =
    fastled/FastLED @ ^3.7.0

build_flags =
    -I../../shared/include
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:esp32-s3-alt4mb]
platform  = espressif32
board     = dfrobot_firebeetle2_esp32s3
framework = arduino

upload_port = COM4
monitor_port = COM4
upload_speed = 115200
monitor_speed = 115200

lib_deps =
    fastled/FastLED @ ^3.7.0

build_flags =
    -I../../shared/include
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DMY_ZONE=1
    -DMY_NODE=2

